api:
  host: 127.0.0.1
  port: 8001
  debug: true
  auth_enabled: false
  cors_allow_origins:
    - http://127.0.0.1:8000
    - http://localhost:8000

analysis:
  content_index_path: data/manifests/content_index.csv
  enriched_content_index_path: content_bank_enriched/enriched_content_index.csv
  prefer_enriched_content: true

asr:
  provider: hf_whisper_local
  hf_model_path: model_artifacts/readirect-whisper-base-en-v1-hf
  ct2_model_path: model_artifacts/readirect-whisper-base-en-v1-ct2
  pretrained_model_size: base.en
  model_size: base.en
  device: cpu
  compute_type: int8
  use_fp16: false
  language: en
  task: transcribe
  timeout_seconds: 60

transcript_normalization:
  phonetic_accept_threshold: 0.88
  phonetic_strict_word_threshold: 0.90
  phonetic_single_letter_threshold: 0.85
  phonetic_known_confusion_threshold: 0.82
  low_confidence_threshold: 0.50
  low_confidence_similarity_threshold: 0.95
