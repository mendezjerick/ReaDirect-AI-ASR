api:
  host: 127.0.0.1
  port: 8001
  debug: true
  auth_enabled: false
  cors_allow_origins:
    - http://127.0.0.1:8000
    - http://localhost:8000

analysis:
  content_index_path: data/manifests/content_index.csv
  enriched_content_index_path: content_bank_enriched/enriched_content_index.csv
  prefer_enriched_content: true

asr:
  provider: hf_whisper_local
  hf_model_path: model_artifacts/readirect-whisper-base-en-v1-hf
  ct2_model_path: model_artifacts/readirect-whisper-base-en-v1-ct2
  pretrained_model_size: base.en
  model_size: base.en
  device: cuda
  compute_type: float16
  use_fp16: true
  language: en
  task: transcribe
  timeout_seconds: 60
