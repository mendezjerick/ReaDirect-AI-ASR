api:
  host: 127.0.0.1
  port: 8001
  debug: true
  auth_enabled: false
  cors_allow_origins:
    - http://127.0.0.1:8000
    - http://localhost:8000

analysis:
  content_index_path: data/manifests/content_index.csv
  enriched_content_index_path: content_bank_enriched/enriched_content_index.csv
  prefer_enriched_content: true

asr:
  provider: wav2vec2_only
  model_name: epsilon
  wav2vec2_asr_model_path: models/asr/epsilon
  wav2vec2_phoneme_model_path: models/wav2vec2-phoneme
  wav2vec2_base_asr_model_path: models/wav2vec2-readirect-asr
  allow_wav2vec2_base_fallback: false
  model_size: models/asr/epsilon
  device: cpu
  decode_mode: beam
  beam_width: 100
  lm_path: external_datasets/language_models/3-gram.pruned.1e-7.arpa
  alpha: 0.5
  beta: 1.0
  hotwords: []
  hotword_weight: 5.0
  allow_no_lm_fallback: false
  language: en
  timeout_seconds: 240

audio_quality:
  min_duration_seconds: 1.0
  max_duration_seconds: 30.0
  low_volume_dbfs: -35.0
  silence_dbfs: -40.0
  mostly_silent_ratio: 0.85
  clipping_threshold: 0.98
  clipped_ratio_threshold: 0.01
  min_speech_ratio: 0.15
  long_pause_seconds: 1.0
  very_long_pause_seconds: 2.0
  enable_quality_gate: true
  retry_on_bad_quality: true

transcript_normalization:
  phonetic_accept_threshold: 0.88
  phonetic_strict_word_threshold: 0.90
  phonetic_single_letter_threshold: 0.85
  phonetic_known_confusion_threshold: 0.82
  phonetic_lattice_threshold: 0.85
  critical_phoneme_required: true
  low_confidence_threshold: 0.50
  low_confidence_similarity_threshold: 0.95
  reinforcement_corrections_enabled: true
  reinforcement_corrections_dir: reinforcement-learning
  letter_reinforcement_file: letter-reinforcement.csv
  word_reinforcement_file: word-reinforcement.csv

gop:
  enabled: true
  model_version: existing_wavtec_phoneme_model
  letter_threshold: 0.70
  word_threshold: 0.75
  rhyme_threshold: 0.75
  sentence_word_threshold: 0.70
  passage_word_threshold: 0.70
  min_alignment_quality: 0.25
  weak_threshold: 0.55
  acceptable_threshold: 0.75
  short_word_assist_enabled: true
  short_word_assist_min_overall: 0.60
  short_word_assist_min_consonant_score: 0.80
  short_word_assist_max_phonemes: 5
  min_audio_quality_required: true
  skip_on_retry_required: true
  skip_on_uncertain_audio: true
  debug: false

dynamic_expected_correction:
  enabled: true
  letter_accept_threshold: 0.72
  word_accept_threshold: 0.78
  rhyme_accept_threshold: 0.78
  sentence_word_accept_threshold: 0.80
  passage_word_accept_threshold: 0.82
  homophone_threshold: 0.96
  min_phoneme_for_low_text_match: 0.90
  min_gop_for_acceptance: 0.75
  fragment_detection_enabled: true
  reject_consonant_fragment_by_default: true
  min_raw_length_ratio_for_words: 0.50
  min_phoneme_coverage_for_words: 0.65
  fragment_gop_accept_threshold: 0.88
  fragment_phoneme_accept_threshold: 0.82
  fragment_retry_on_bad_audio: true
  fragment_allow_accept_with_strong_gop: true
  asr_spelling_variant_enabled: true
  asr_variant_word_accept_threshold: 0.78
  asr_variant_rhyme_accept_threshold: 0.78
  asr_variant_letter_accept_threshold: 0.72
  asr_variant_sentence_word_accept_threshold: 0.82
  asr_variant_passage_word_accept_threshold: 0.84
  asr_variant_min_consonant_skeleton: 0.80
  asr_variant_min_vowel_tolerant_score: 0.78
  asr_variant_min_gop_for_risky_accept: 0.82
  asr_variant_min_phoneme_coverage: 0.70
  asr_variant_short_word_strict: true
  asr_variant_debug: true
  dynamic_alignment_repair_enabled: true
  dynamic_alignment_allow_split_merge: true
  dynamic_alignment_max_expected_chunk: 3
  dynamic_alignment_max_raw_chunk: 3
  dynamic_alignment_accept_threshold: 0.82
  dynamic_alignment_partial_threshold: 0.65
  dynamic_alignment_split_merge_threshold: 0.84
  dynamic_alignment_homophone_threshold: 0.96
  dynamic_alignment_gop_accept_threshold: 0.75
  dynamic_alignment_short_function_word_strict: true
  dynamic_alignment_debug: true
  skip_on_retry_required: true
  skip_on_uncertain_audio: true
  debug: false
