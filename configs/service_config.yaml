api:
  host: 127.0.0.1
  port: 8001
  debug: true
  auth_enabled: false
  cors_allow_origins:
    - http://127.0.0.1:8000
    - http://localhost:8000

analysis:
  content_index_path: data/manifests/content_index.csv
  enriched_content_index_path: content_bank_enriched/enriched_content_index.csv
  prefer_enriched_content: true

asr:
  provider: wav2vec2_only
  wav2vec2_asr_model_path: models/wav2vec2-readirect-asr
  wav2vec2_phoneme_model_path: models/wav2vec2-phoneme
  wav2vec2_base_asr_model_path: models/wav2vec2-base-960h
  allow_wav2vec2_base_fallback: false
  model_size: models/wav2vec2-readirect-asr
  device: cpu
  language: en
  timeout_seconds: 60

audio_quality:
  min_duration_seconds: 1.0
  max_duration_seconds: 30.0
  low_volume_dbfs: -35.0
  silence_dbfs: -40.0
  mostly_silent_ratio: 0.85
  clipping_threshold: 0.98
  clipped_ratio_threshold: 0.01
  min_speech_ratio: 0.15
  long_pause_seconds: 1.0
  very_long_pause_seconds: 2.0
  enable_quality_gate: true
  retry_on_bad_quality: true

transcript_normalization:
  phonetic_accept_threshold: 0.88
  phonetic_strict_word_threshold: 0.90
  phonetic_single_letter_threshold: 0.85
  phonetic_known_confusion_threshold: 0.82
  phonetic_lattice_threshold: 0.85
  critical_phoneme_required: true
  low_confidence_threshold: 0.50
  low_confidence_similarity_threshold: 0.95
  reinforcement_corrections_enabled: true
  reinforcement_corrections_dir: reinforcement-learning
  letter_reinforcement_file: letter-reinforcement.csv
