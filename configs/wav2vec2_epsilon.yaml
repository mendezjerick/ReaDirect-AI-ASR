run:
  name: Epsilon
  seed: 47

model:
  delta_checkpoint_path: ${DELTA_CHECKPOINT_PATH:-models/asr/delta}
  reference_base_model_path: ${WAV2VEC2_ALPHA_BASE_MODEL_PATH:-models/wav2vec2-base-960h}
  output_model_path: models/asr/epsilon
  checkpoint_dir: models/asr/epsilon/checkpoints
  report_dir: reports/asr/epsilon
  log_dir: reports/asr/epsilon/logs

data:
  sample_rate: 16000
  min_duration_seconds: 0.3
  max_duration_seconds: 25.0
  preprocessing_num_proc: 1

  gigaspeech:
    parquet_dir: ${GIGASPEECH_S_PATH:-external_datasets/gigaspeech_s_parquet/parquet-data/s}
    cache_dir: ${GIGASPEECH_CACHE_DIR:-external_datasets/hf_cache}
    train_glob: train-*.parquet

  slr83:
    root_dir: ${SLR83_ROOT:-external_datasets/SLR83}
    female_dir: southern_english_female
    male_dir: southern_english_male
    index_file: line_index.csv
    train_ratio: 0.80
    split_seed: 47

  speechocean:
    train_manifest: ${SPEECHOCEAN_TRAIN_MANIFEST:-external_datasets/manifests/speechocean_train.jsonl}
    validation_manifest: ${SPEECHOCEAN_VALID_MANIFEST:-external_datasets/manifests/speechocean_valid.jsonl}
    test_manifest: ${SPEECHOCEAN_TEST_MANIFEST:-external_datasets/manifests/speechocean_test.jsonl}

  readirect_letters:
    root_dir: ${READIRECT_LETTERS_ROOT:-external_datasets/readirect_letters}
    train_manifest: ${READIRECT_LETTERS_TRAIN_MANIFEST:-external_datasets/readirect_letters/manifests/readirect_letters_train.jsonl}
    validation_manifest: ${READIRECT_LETTERS_VALID_MANIFEST:-external_datasets/readirect_letters/manifests/readirect_letters_valid.jsonl}
    test_manifest: ${READIRECT_LETTERS_TEST_MANIFEST:-external_datasets/readirect_letters/manifests/readirect_letters_test.jsonl}

  sampling:
    strategy: deterministic_virtual_epoch
    effective_epoch_rows: ${EPSILON_EFFECTIVE_EPOCH_ROWS:-40000}
    shuffle: true
    ratios:
      gigaspeech: 0.45
      slr83_southern_english: 0.30
      speechocean: 0.15
      readirect_letters: 0.10

training:
  num_train_epochs: 1
  max_allowed_epochs: 2
  per_device_train_batch_size: 4
  per_device_eval_batch_size: 4
  gradient_accumulation_steps: 2
  learning_rate: 0.000005
  warmup_ratio: 0.03
  logging_steps: 25
  eval_steps: 250
  save_steps: 250
  fp16: true_if_cuda_available
  freeze_feature_encoder: true
  gradient_checkpointing: true
  save_total_limit: 1
  dataloader_num_workers: 0
  require_cuda: true
  early_stopping_patience: 2
  early_stopping_threshold: 0.0

evaluation:
  lm_path: ${EPSILON_LM_PATH:-external_datasets/language_models/3-gram.pruned.1e-7.arpa}
  comparison_artifacts:
    beta: reports/asr/decoder_lm_comparison/beta_beam_lm_evaluation.json
    gamma: reports/asr/gamma/gamma_shared_validation_evaluation.json
    delta: reports/asr/decoder_lm_comparison/delta_beam_lm_evaluation.json
