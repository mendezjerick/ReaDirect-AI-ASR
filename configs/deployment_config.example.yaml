local_development:
  api_base_url: http://127.0.0.1:8001
  auth_enabled: false
  asr_provider: mock
  notes: Use mock for tests and collaborators without model artifacts.

production_same_server:
  api_host: 127.0.0.1
  api_port: 8001
  auth_enabled: true
  asr_provider: wav2vec2_only
  asr_model_name: epsilon
  wav2vec2_asr_model_path: models/asr/epsilon
  wav2vec2_phoneme_model_path: models/wav2vec2-phoneme
  wav2vec2_base_asr_model_path: models/wav2vec2-readirect-asr
  allow_wav2vec2_base_fallback: false
  decode_mode: beam_lm
  beam_width: 100
  lm_path: external_datasets/language_models/3-gram.pruned.1e-7.arpa
  alpha: 0.5
  beta: 1.0
  hotwords: []
  hotword_weight: 5.0
  allow_no_lm_fallback: false
  laravel_base_url: http://127.0.0.1:8000

production_separate_ai_server:
  api_host: 0.0.0.0
  api_port: 8001
  auth_enabled: true
  asr_provider: wav2vec2_only
  asr_model_name: epsilon
  wav2vec2_asr_model_path: /opt/readirect-ai/models/asr/epsilon
  wav2vec2_phoneme_model_path: /opt/readirect-ai/models/wav2vec2-phoneme
  wav2vec2_base_asr_model_path: /opt/readirect-ai/models/wav2vec2-readirect-asr
  allow_wav2vec2_base_fallback: false
  decode_mode: beam_lm
  beam_width: 100
  lm_path: /opt/readirect-ai/external_datasets/language_models/3-gram.pruned.1e-7.bin
  alpha: 0.5
  beta: 1.0
  hotwords: []
  hotword_weight: 5.0
  allow_no_lm_fallback: false
  laravel_base_url: https://your-readirect-host.example
