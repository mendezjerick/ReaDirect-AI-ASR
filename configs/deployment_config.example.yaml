local_development:
  api_base_url: http://127.0.0.1:8001
  auth_enabled: false
  asr_provider: mock
  notes: Use mock for tests and collaborators without model artifacts.

production_same_server:
  api_host: 127.0.0.1
  api_port: 8001
  auth_enabled: true
  asr_provider: wav2vec2_only
  wav2vec2_asr_model_path: models/wav2vec2-readirect-asr
  wav2vec2_phoneme_model_path: models/wav2vec2-phoneme
  wav2vec2_base_asr_model_path: models/wav2vec2-base-960h
  allow_wav2vec2_base_fallback: false
  laravel_base_url: http://127.0.0.1:8000

production_separate_ai_server:
  api_host: 0.0.0.0
  api_port: 8001
  auth_enabled: true
  asr_provider: wav2vec2_only
  wav2vec2_asr_model_path: /opt/readirect-ai/models/wav2vec2-readirect-asr
  wav2vec2_phoneme_model_path: /opt/readirect-ai/models/wav2vec2-phoneme
  wav2vec2_base_asr_model_path: /opt/readirect-ai/models/wav2vec2-base-960h
  allow_wav2vec2_base_fallback: false
  laravel_base_url: https://your-readirect-host.example
